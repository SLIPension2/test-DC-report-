<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>삼성생명 | DC 투자분석 리포트</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap');

:root {
  --blue:        #0055FF;
  --blue-mid:    #4D88FF;
  --blue-light:  #EBF1FF;
  --navy:        #0A1F5C;
  --slate:       #64748B;
  --smoke:       #F5F7FA;
  --line:        #E4E9F0;
  --white:       #FFFFFF;
  --text:        #1A202C;
  --red:         #EF4444;
  --green:       #10B981;
  --warn-bg:     #FFF8E1;
  --warn:        #F59E0B;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--smoke);
  color: var(--text);
  font-size: 14px;
  -webkit-text-size-adjust: 100%;
}

/* ══ LANDING ══ */
#landing {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 40px 16px 60px;
  background: linear-gradient(160deg, #0033CC 0%, #0055FF 60%, #3377FF 100%);
}

.brand {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  color: rgba(255,255,255,.6);
  margin-bottom: 20px;
  text-align: center;
}

.landing-title {
  font-size: 26px;
  font-weight: 900;
  color: #fff;
  text-align: center;
  line-height: 1.3;
  margin-bottom: 8px;
}

.landing-sub {
  font-size: 13px;
  color: rgba(255,255,255,.65);
  text-align: center;
  margin-bottom: 28px;
  line-height: 1.6;
}

.form-card {
  background: var(--white);
  border-radius: 20px;
  padding: 24px 20px;
  width: 100%;
  max-width: 500px;
  box-shadow: 0 20px 60px rgba(0,0,0,.25);
}

.form-section-title {
  font-size: 10px;
  font-weight: 800;
  color: var(--blue);
  letter-spacing: 1.5px;
  margin-bottom: 14px;
}

.form-col { display: flex; flex-direction: column; gap: 12px; margin-bottom: 12px; }

.form-group { display: flex; flex-direction: column; gap: 5px; }

label { font-size: 12px; font-weight: 700; color: var(--slate); }

input, select {
  border: 1.5px solid var(--line);
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 14px;
  font-family: inherit;
  color: var(--text);
  outline: none;
  background: #fafbfc;
  width: 100%;
  transition: border-color .15s;
  -webkit-appearance: none;
}
input:focus, select:focus { border-color: var(--blue); background: var(--white); }

.divider { border: none; border-top: 1px solid var(--line); margin: 20px 0; }

/* product rows */
.prod-header {
  display: grid;
  grid-template-columns: 1fr 1fr 56px 34px;
  gap: 6px;
  font-size: 10px;
  font-weight: 700;
  color: var(--slate);
  letter-spacing: .5px;
  margin-bottom: 6px;
  padding: 0 2px;
}

.product-row {
  display: grid;
  grid-template-columns: 1fr 1fr 56px 34px;
  gap: 6px;
  margin-bottom: 8px;
  align-items: center;
}

.product-row input,
.product-row select {
  padding: 10px 8px;
  font-size: 12px;
  border-radius: 8px;
}

.btn-rm {
  width: 34px; height: 34px;
  background: #FEE2E2; border: none; border-radius: 8px;
  color: var(--red); font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

.btn-add {
  width: 100%;
  background: var(--blue-light);
  border: 1.5px dashed var(--blue);
  border-radius: 10px;
  color: var(--blue);
  font-size: 13px; font-weight: 700;
  padding: 10px;
  cursor: pointer;
  font-family: inherit;
  margin-top: 4px;
}

/* 엑셀 업로드 */
.excel-upload-wrap { margin-bottom: 16px; }

.excel-upload-label {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 14px;
  background: #F0FFF4;
  border: 1.5px dashed #10B981;
  border-radius: 12px;
  color: #065F46;
  font-size: 13px; font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: background .15s;
}
.excel-upload-label:hover { background: #DCFCE7; }
.excel-upload-label input[type="file"] { display: none; }

.excel-status {
  margin-top: 8px;
  padding: 10px 12px;
  border-radius: 8px;
  font-size: 12px; font-weight: 600;
  display: none;
}
.excel-status.ok  { background: #ECFDF5; color: #065F46; border: 1px solid #A7F3D0; }
.excel-status.err { background: #FEF2F2; color: #991B1B; border: 1px solid #FECACA; }

.btn-submit {
  width: 100%;
  background: var(--blue);
  color: var(--white);
  border: none;
  border-radius: 12px;
  font-size: 15px; font-weight: 800;
  padding: 16px;
